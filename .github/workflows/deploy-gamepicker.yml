name: 🚀 Deploy Game Picker

# Deploy Game Picker to GitHub Pages on this repository (webdrink/leagueoffun)
env:
  APP_NAME: gamepicker

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/gamepicker/**'
      - 'packages/**'
      - '.github/workflows/deploy-gamepicker.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy-gamepicker"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: 🏗️ Build & Deploy Game Picker
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: |
          echo "📥 Installing dependencies..."
          if ! pnpm install --frozen-lockfile; then
            echo "⚠️ Lockfile mismatch, updating dependencies..."
            pnpm install --no-frozen-lockfile
          fi

      - name: 🏗️ Build Game Picker
        run: pnpm --filter @leagueoffun/gamepicker build

      - name: 🔍 Validate Build Output
        run: |
          echo "🔍 Validating build output..."
          
          # Check index.html exists
          if [ ! -f "apps/${{ env.APP_NAME }}/dist/index.html" ]; then
            echo "❌ Error: index.html not found"
            exit 1
          fi
          
          # Check assets folder exists
          if [ ! -d "apps/${{ env.APP_NAME }}/dist/assets" ]; then
            echo "❌ Error: assets folder not found"
            exit 1
          fi
          
          # List all files for debugging
          echo "📦 Build contents:"
          ls -lah apps/${{ env.APP_NAME }}/dist/
          
          # Verify JavaScript and CSS files exist
          JS_COUNT=$(find apps/${{ env.APP_NAME }}/dist/assets -name "*.js" | wc -l)
          CSS_COUNT=$(find apps/${{ env.APP_NAME }}/dist/assets -name "*.css" | wc -l)
          
          echo "✅ Found $JS_COUNT JavaScript files"
          echo "✅ Found $CSS_COUNT CSS files"
          
          if [ $JS_COUNT -eq 0 ]; then
            echo "❌ Error: No JavaScript files found"
            exit 1
          fi

      - name: 📝 Add CNAME for Custom Domain
        run: |
          echo "www.leagueoffun.com" > apps/${{ env.APP_NAME }}/dist/CNAME
          echo "📝 Added CNAME: www.leagueoffun.com"

      - name: 📝 Add .nojekyll
        run: |
          touch apps/${{ env.APP_NAME }}/dist/.nojekyll
          echo "📝 Added .nojekyll file"

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gamepicker-dist
          path: apps/gamepicker/dist/
          retention-days: 30

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: ⬆️ Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/${{ env.APP_NAME }}/dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Build Complete
        run: |
          echo "✅ Game Picker deployed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
