name: 🚀 Deploy HookHunt

# Target hosting repository (change this to update where builds are deployed)
env:
  TARGET_REPO: webdrink/HookHunt
  APP_NAME: hookhunt
  DEPLOY_PATH: deploy-hookhunt

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/hookhunt/**'
      - 'packages/**'
      - '.github/workflows/deploy-hookhunt.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-hookhunt"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: 🏗️ Build & Deploy HookHunt
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: |
          echo "📥 Installing dependencies..."
          if ! pnpm install --frozen-lockfile; then
            echo "⚠️ Lockfile mismatch, updating dependencies..."
            pnpm install --no-frozen-lockfile
          fi

      - name: 🏗️ Build HookHunt
        run: pnpm --filter @leagueoffun/hookhunt build

      - name: 🔍 Validate Build Output
        run: |
          echo "🔍 Validating build output..."
          
          # Check index.html exists
          if [ ! -f "apps/${{ env.APP_NAME }}/dist/index.html" ]; then
            echo "❌ Error: index.html not found"
            exit 1
          fi
          
          # Check assets folder exists
          if [ ! -d "apps/${{ env.APP_NAME }}/dist/assets" ]; then
            echo "❌ Error: assets folder not found"
            exit 1
          fi
          
          # List all files for debugging
          echo "📦 Build contents:"
          ls -lah apps/${{ env.APP_NAME }}/dist/
          
          # Verify JavaScript and CSS files exist
          JS_COUNT=$(find apps/${{ env.APP_NAME }}/dist/assets -name "*.js" | wc -l)
          CSS_COUNT=$(find apps/${{ env.APP_NAME }}/dist/assets -name "*.css" | wc -l)
          
          echo "✅ Found $JS_COUNT JavaScript files"
          echo "✅ Found $CSS_COUNT CSS files"
          
          if [ $JS_COUNT -eq 0 ]; then
            echo "❌ Error: No JavaScript files found"
            exit 1
          fi

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hookhunt-dist
          path: apps/hookhunt/dist/
          retention-days: 30

      - name: ⬇️ Checkout Hosting Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          path: ${{ env.DEPLOY_PATH }}
          token: ${{ secrets.DEPLOY_PAT }}

      - name: 🚀 Deploy to Hosting Repository
        run: |
          echo "🚀 Deploying ${{ env.APP_NAME }} to ${{ env.TARGET_REPO }}..."
          
          cd ${{ env.DEPLOY_PATH }}
          
          # Preserve CNAME and README.md if they exist
          if [ -f "CNAME" ]; then
            cp CNAME /tmp/CNAME_backup
            echo "📝 Preserved CNAME file"
          fi
          if [ -f "README.md" ]; then
            cp README.md /tmp/README_backup
            echo "📝 Preserved README.md file"
          fi
          
          # Remove all files except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # Copy new build files
          cp -r ../apps/${{ env.APP_NAME }}/dist/* .
          
          # Restore preserved files
          if [ -f "/tmp/CNAME_backup" ]; then
            cp /tmp/CNAME_backup CNAME
            echo "📝 Restored CNAME file"
          fi
          if [ -f "/tmp/README_backup" ]; then
            cp /tmp/README_backup README.md
            echo "📝 Restored README.md file"
          fi
          
          # Add .nojekyll file for GitHub Pages
          touch .nojekyll
          
          # Configure git
          git config user.name "leagueoffun-bot"
          git config user.email "ci@users.noreply.github.com"
          
          # Check for changes and commit
          git add -A
          if git diff --cached --quiet; then
            echo "✅ No changes to deploy"
          else
            git commit -m "Deploy ${{ env.APP_NAME }} - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Deployment complete!"
          fi

      - name: ✅ Build Complete
        run: echo "✅ HookHunt built and deployed successfully"
