name: 🚀 Deploy All Apps

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/deploy-all.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'deploy-all'
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 🏗️ Build All Apps
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type Check
        run: pnpm typecheck

      - name: 🏗️ Build Gamepicker
        run: |
          echo "🏗️ Building Gamepicker..."
          pnpm --filter @leagueoffun/gamepicker build
          echo "✅ Gamepicker build complete"

      - name: ✅ Verify Gamepicker Build
        run: |
          if [ ! -f "apps/gamepicker/dist/index.html" ]; then
            echo "❌ Error: Gamepicker index.html not found"
            exit 1
          fi
          if [ ! -d "apps/gamepicker/dist/assets" ]; then
            echo "❌ Error: Gamepicker assets folder not found"
            exit 1
          fi
          echo "✅ Gamepicker build verification passed"
          ls -la apps/gamepicker/dist/

      - name: 🏗️ Build Blamegame
        run: |
          echo "🏗️ Building Blamegame..."
          pnpm --filter @leagueoffun/blamegame build
          echo "✅ Blamegame build complete"

      - name: ✅ Verify Blamegame Build
        run: |
          if [ ! -f "apps/blamegame/dist/index.html" ]; then
            echo "❌ Error: Blamegame index.html not found"
            exit 1
          fi
          if [ ! -d "apps/blamegame/dist/assets" ]; then
            echo "❌ Error: Blamegame assets folder not found"
            exit 1
          fi
          echo "✅ Blamegame build verification passed"
          ls -la apps/blamegame/dist/

      - name: 🏗️ Build HookHunt
        env:
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          VITE_SPOTIFY_REDIRECT_URI: https://hookhunt.leagueoffun.com/callback/
        run: |
          echo "🏗️ Building HookHunt..."
          pnpm --filter @leagueoffun/hookhunt build
          echo "✅ HookHunt build complete"

      - name: ✅ Verify HookHunt Build
        run: |
          if [ ! -f "apps/hookhunt/dist/index.html" ]; then
            echo "❌ Error: HookHunt index.html not found"
            exit 1
          fi
          if [ ! -d "apps/hookhunt/dist/assets" ]; then
            echo "❌ Error: HookHunt assets folder not found"
            exit 1
          fi
          echo "✅ HookHunt build verification passed"
          ls -la apps/hookhunt/dist/

      - name: 📤 Upload Gamepicker Artifact
        uses: actions/upload-artifact@v7
        with:
          name: gamepicker-dist
          path: apps/gamepicker/dist/
          retention-days: 1

      - name: 📤 Upload Blamegame Artifact
        uses: actions/upload-artifact@v7
        with:
          name: blamegame-dist
          path: apps/blamegame/dist/
          retention-days: 1

      - name: 📤 Upload HookHunt Artifact
        uses: actions/upload-artifact@v7
        with:
          name: hookhunt-dist
          path: apps/hookhunt/dist/
          retention-days: 1

  deploy-gamepicker:
    name: 🎮 Deploy Gamepicker (GitHub Pages)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Download Gamepicker Artifact
        uses: actions/download-artifact@v8
        with:
          name: gamepicker-dist
          path: ./dist

      - name: 📝 Add CNAME for Custom Domain
        run: |
          echo "www.leagueoffun.com" > ./dist/CNAME
          echo "📝 Added CNAME: www.leagueoffun.com"

      - name: 📝 Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: ⬆️ Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Gamepicker Deployment Complete
        run: |
          echo "✅ Gamepicker deployed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"

      - name: 🧪 Smoke Test - Wait for Pages Deployment
        run: |
          echo "⏳ Waiting 30 seconds for GitHub Pages to update..."
          sleep 30

      - name: 🧪 Smoke Test - Verify Site Accessibility
        run: |
          echo "🧪 Testing https://www.leagueoffun.com..."
          
          # Try up to 5 times with 20 second delays (CDN propagation can take several minutes)
          for i in {1..5}; do
            if curl -f -s -o /dev/null -w "%{http_code}" https://www.leagueoffun.com | grep -q "200"; then
              echo "✅ Site is accessible (HTTP 200)"
              
              # Verify HTML contains expected content
              RESPONSE=$(curl -s https://www.leagueoffun.com)
              if echo "$RESPONSE" | grep -q "<title>"; then
                echo "✅ HTML content verified"
                exit 0
              else
                echo "⚠️ HTML content check failed"
                exit 1
              fi
            else
              echo "⚠️ Attempt $i/5 failed, retrying in 20 seconds..."
              sleep 20
            fi
          done
          
          echo "⚠️ Site accessibility check did not pass within timeout - deployment may still be propagating"
          echo "ℹ️ Smoke test is non-blocking; the deployment completed successfully"
          exit 0

  deploy-blamegame:
    name: 🎯 Deploy Blamegame
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Download Blamegame Artifact
        uses: actions/download-artifact@v8
        with:
          name: blamegame-dist
          path: ./blamegame-dist

      - name: ⬇️ Clone Target Repository
        run: |
          echo "📥 Cloning webdrink/blamegame..."
          git clone https://x-access-token:${{ secrets.DEPLOY_PAT }}@github.com/webdrink/blamegame.git deploy-blamegame
          echo "✅ Repository cloned"

      - name: 🚀 Deploy to webdrink/blamegame
        run: |
          echo "🚀 Deploying Blamegame to webdrink/blamegame..."
          
          cd deploy-blamegame
          
          # Preserve README.md if it exists
          if [ -f "README.md" ]; then
            cp README.md /tmp/README_blamegame_backup
            echo "📝 Preserved README.md"
          fi
          
          # Remove all tracked files except .git directory using git
          git rm -rf --ignore-unmatch . || true
          git clean -fd || true
          
          # Copy new build files
          cp -r ../blamegame-dist/* .
          
          # Restore README.md
          if [ -f "/tmp/README_blamegame_backup" ]; then
            cp /tmp/README_blamegame_backup README.md
            echo "📝 Restored README.md"
          fi
          
          # Ensure CNAME file exists with correct domain
          echo "blamegame.leagueoffun.com" > CNAME
          echo "📝 Added CNAME: blamegame.leagueoffun.com"
          
          # Add .nojekyll file for GitHub Pages
          touch .nojekyll
          
          # Configure git
          git config user.name "leagueoffun-bot"
          git config user.email "ci@users.noreply.github.com"
          
          # Check for changes and commit
          git add -A
          if git diff --cached --quiet; then
            echo "✅ No changes to deploy"
          else
            git commit -m "Deploy Blamegame - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Blamegame deployment complete!"
          fi

      - name: ✅ Blamegame Deployment Complete
        run: |
          echo "✅ Blamegame deployed successfully!"
          echo "🌐 URL: https://blamegame.leagueoffun.com"

      - name: 🧪 Smoke Test - Wait for Pages Deployment
        run: |
          echo "⏳ Waiting 30 seconds for GitHub Pages to update..."
          sleep 30

      - name: 🧪 Smoke Test - Verify Site Accessibility
        run: |
          echo "🧪 Testing https://blamegame.leagueoffun.com..."
          
          # Try up to 5 times with 20 second delays (CDN propagation can take several minutes)
          for i in {1..5}; do
            if curl -f -s -o /dev/null -w "%{http_code}" https://blamegame.leagueoffun.com | grep -q "200"; then
              echo "✅ Site is accessible (HTTP 200)"
              
              # Verify HTML contains expected content
              RESPONSE=$(curl -s https://blamegame.leagueoffun.com)
              if echo "$RESPONSE" | grep -q "<title>"; then
                echo "✅ HTML content verified"
                exit 0
              else
                echo "⚠️ HTML content check failed"
                exit 1
              fi
            else
              echo "⚠️ Attempt $i/5 failed, retrying in 20 seconds..."
              sleep 20
            fi
          done
          
          echo "⚠️ Site accessibility check did not pass within timeout - deployment may still be propagating"
          echo "ℹ️ Smoke test is non-blocking; the deployment completed successfully"
          exit 0

  deploy-hookhunt:
    name: 🎵 Deploy HookHunt
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Download HookHunt Artifact
        uses: actions/download-artifact@v8
        with:
          name: hookhunt-dist
          path: ./hookhunt-dist

      - name: ⬇️ Clone Target Repository
        run: |
          echo "📥 Cloning webdrink/HookHunt..."
          git clone https://x-access-token:${{ secrets.DEPLOY_PAT }}@github.com/webdrink/HookHunt.git deploy-hookhunt
          echo "✅ Repository cloned"

      - name: 🚀 Deploy to webdrink/HookHunt
        run: |
          echo "🚀 Deploying HookHunt to webdrink/HookHunt..."
          
          cd deploy-hookhunt
          
          # Preserve README.md if it exists
          if [ -f "README.md" ]; then
            cp README.md /tmp/README_hookhunt_backup
            echo "📝 Preserved README.md"
          fi
          
          # Remove all tracked files except .git directory using git
          git rm -rf --ignore-unmatch . || true
          git clean -fd || true
          
          # Copy new build files
          cp -r ../hookhunt-dist/* .
          
          # Restore README.md
          if [ -f "/tmp/README_hookhunt_backup" ]; then
            cp /tmp/README_hookhunt_backup README.md
            echo "📝 Restored README.md"
          fi
          
          # Ensure CNAME file exists with correct domain
          echo "hookhunt.leagueoffun.com" > CNAME
          echo "📝 Added CNAME: hookhunt.leagueoffun.com"
          
          # Add .nojekyll file for GitHub Pages
          touch .nojekyll
          
          # Configure git
          git config user.name "leagueoffun-bot"
          git config user.email "ci@users.noreply.github.com"
          
          # Check for changes and commit
          git add -A
          if git diff --cached --quiet; then
            echo "✅ No changes to deploy"
          else
            git commit -m "Deploy HookHunt - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ HookHunt deployment complete!"
          fi

      - name: ✅ HookHunt Deployment Complete
        run: |
          echo "✅ HookHunt deployed successfully!"
          echo "🌐 URL: https://hookhunt.leagueoffun.com"

      - name: 🧪 Smoke Test - Wait for Pages Deployment
        run: |
          echo "⏳ Waiting 30 seconds for GitHub Pages to update..."
          sleep 30

      - name: 🧪 Smoke Test - Verify Site Accessibility
        run: |
          echo "🧪 Testing https://hookhunt.leagueoffun.com..."
          
          # Try up to 5 times with 20 second delays (CDN propagation can take several minutes)
          for i in {1..5}; do
            if curl -f -s -o /dev/null -w "%{http_code}" https://hookhunt.leagueoffun.com | grep -q "200"; then
              echo "✅ Site is accessible (HTTP 200)"
              
              # Verify HTML contains expected content
              RESPONSE=$(curl -s https://hookhunt.leagueoffun.com)
              if echo "$RESPONSE" | grep -q "<title>"; then
                echo "✅ HTML content verified"
                exit 0
              else
                echo "⚠️ HTML content check failed"
                exit 1
              fi
            else
              echo "⚠️ Attempt $i/5 failed, retrying in 20 seconds..."
              sleep 20
            fi
          done
          
          echo "⚠️ Site accessibility check did not pass within timeout - deployment may still be propagating"
          echo "ℹ️ Smoke test is non-blocking; the deployment completed successfully"
          exit 0

  summary:
    name: 📊 Deployment Summary
    needs: [deploy-gamepicker, deploy-blamegame, deploy-hookhunt]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Gamepicker | ${{ needs.deploy-gamepicker.result == 'success' && '✅ Success' || '❌ Failed' }} | https://www.leagueoffun.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Blamegame | ${{ needs.deploy-blamegame.result == 'success' && '✅ Success' || '❌ Failed' }} | https://blamegame.leagueoffun.com |" >> $GITHUB_STEP_SUMMARY
          echo "| HookHunt | ${{ needs.deploy-hookhunt.result == 'success' && '✅ Success' || '❌ Failed' }} | https://hookhunt.leagueoffun.com |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if Any Deployment Failed
        if: needs.deploy-gamepicker.result != 'success' || needs.deploy-blamegame.result != 'success' || needs.deploy-hookhunt.result != 'success'
        run: |
          echo "❌ One or more deployments failed!"
          exit 1
