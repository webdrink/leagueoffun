name: ✅ CI - Lint, Type Check & Build

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: 🔍 Lint, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type Check
        run: pnpm typecheck

      - name: 🧹 Lint
        run: pnpm lint

      - name: 🏗️ Build Gamepicker
        run: pnpm --filter @leagueoffun/gamepicker build

      - name: 🏗️ Build Blamegame
        run: pnpm --filter @leagueoffun/blamegame build

      - name: 🔐 Validate Spotify Build Env
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        run: |
          if [ -z "${SPOTIFY_CLIENT_ID}" ]; then
            echo "❌ SPOTIFY_CLIENT_ID secret is empty or unavailable."
            exit 1
          fi
          echo "✅ SPOTIFY_CLIENT_ID present (length: ${#SPOTIFY_CLIENT_ID})"

      - name: 🏗️ Build HookHunt
        env:
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          VITE_SPOTIFY_REDIRECT_URI: https://hookhunt.leagueoffun.com/callback/
          VITE_BUILD_SHA: ${{ github.sha }}
        run: pnpm --filter @leagueoffun/hookhunt build

      - name: 🔒 Verify HookHunt Bundle Safety
        run: |
          if grep -R --line-number "Missing Spotify Client ID" apps/hookhunt/dist/assets/*.js >/dev/null 2>&1; then
            echo "❌ HookHunt bundle indicates missing Spotify client ID at build time."
            exit 1
          fi

          if grep -R --line-number "SPOTIFY_CLIENT_SECRET" apps/hookhunt/dist >/dev/null 2>&1; then
            echo "❌ Found forbidden SPOTIFY_CLIENT_SECRET marker in dist output."
            exit 1
          fi

          if grep -R --line-number "external-spotify-open" apps/hookhunt/dist/assets/*.js >/dev/null 2>&1; then
            echo "❌ Found forbidden external Spotify fallback path in HookHunt bundle."
            exit 1
          fi

          if grep -R --line-number "requestMediaKeySystemAccess" apps/hookhunt/dist/assets/*.js >/dev/null 2>&1; then
            echo "❌ Found blocking EME preflight marker in HookHunt bundle."
            exit 1
          fi

      - name: 📊 CI Summary
        if: always()
        run: |
          echo "## ✅ CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
