name: 🆘 Emergency Fallback Deployment

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for emergency deployment'
        required: true
        default: 'Main workflow failed'
  
  # Auto-trigger when any primary deploy workflow fails
  workflow_run:
    workflows:
      - "🚀 Deploy All Apps"
      - "🚀 Deploy BlameGame"
      - "🚀 Deploy HookHunt"
      - "🚀 Deploy Game Picker"
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  emergency-deploy:
    name: 🆘 Emergency Deployment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: github-pages
      url: https://www.leagueoffun.com
    
    steps:
      - name: ⬇️ Emergency Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: ⚙️ Install Dependencies
        run: |
          echo "🚨 Emergency mode: Installing dependencies..."
          if ! pnpm install --frozen-lockfile; then
            echo "⚠️ Lockfile mismatch, trying without frozen lockfile..."
            pnpm install --no-frozen-lockfile
          fi

      - name: 🏗️ Emergency Build - Gamepicker
        id: build-gamepicker
        continue-on-error: true
        run: |
          echo "🚨 Emergency build: Gamepicker..."
          pnpm --filter @leagueoffun/gamepicker build
          echo "✅ Gamepicker build succeeded"

      - name: 🔍 Verify Emergency Build
        run: |
          if [ "${{ steps.build-gamepicker.outcome }}" == "success" ] && [ -f "apps/gamepicker/dist/index.html" ]; then
            echo "✅ Emergency build verified"
            echo "📁 Build contents:"
            ls -la apps/gamepicker/dist/
          else
            echo "⚠️ Standard build failed, creating minimal static maintenance page..."
            
            mkdir -p apps/gamepicker/dist
            cat > apps/gamepicker/dist/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <title>League of Fun - Service Recovery</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="300">
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 600px; background: rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .status { background: rgba(255,193,7,0.2); border: 2px solid #ffc107; color: #fff; padding: 20px; border-radius: 10px; margin: 20px 0; }
    .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 League of Fun</h1>
    <div class="spinner"></div>
    <div class="status">
      <strong>🔧 Service Recovery in Progress</strong><br><br>
      Our automatic recovery system is actively working to restore service.
    </div>
    <p>⏱️ This page will automatically refresh every 5 minutes</p>
  </div>
</body>
</html>
EOF
            echo "🆘 Created emergency maintenance page"
          fi

      - name: 📝 Add CNAME and .nojekyll
        run: |
          echo "www.leagueoffun.com" > apps/gamepicker/dist/CNAME
          touch apps/gamepicker/dist/.nojekyll

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: ⬆️ Upload Emergency Build
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'apps/gamepicker/dist'

      - name: 🚀 Emergency Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: ✅ Verify Emergency Deployment
        run: |
          echo "🔍 Verifying emergency deployment..."
          
          # Extended verification with multiple checks
          for attempt in {1..6}; do
            echo "🔍 Verification attempt $attempt/6..."
            
            if curl -f -s --max-time 30 "https://www.leagueoffun.com/" > /dev/null; then
              echo "✅ Emergency deployment verified!"
              echo "🌐 Site accessible at: https://www.leagueoffun.com/"
              break
            else
              echo "⚠️ Site not accessible yet (attempt $attempt), waiting 30 seconds..."
              if [ $attempt -lt 6 ]; then
                sleep 30
              else
                echo "⚠️ Site may still be propagating - deployment was submitted successfully"
              fi
            fi
          done

      - name: 📢 Create Issue for Failed Deployment
        if: github.event.workflow_run.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Deployment Workflow Failed - Emergency Deployment Activated',
              body: `## 🆘 Emergency Deployment Report
              
The deployment workflow failed and emergency deployment was automatically triggered.

**Failure Details:**
- **Failed Workflow:** ${context.payload.workflow_run.name}
- **Workflow Run:** ${context.payload.workflow_run.html_url}
- **Conclusion:** ${context.payload.workflow_run.conclusion}
- **Emergency Deployment:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
- **Time:** ${new Date().toISOString()}

**Next Steps:**
1. Investigate the failed workflow run
2. Fix underlying issues
3. Trigger a new deployment via workflow_dispatch
4. Close this issue once resolved

_Auto-created by Emergency Fallback Deployment workflow_`,
              labels: ['bug', 'deployment', 'emergency']
            });
            
            console.log(\`Created issue #\${issue.data.number}\`);

      - name: 📊 Emergency Report
        if: always()
        run: |
          echo "## 🆘 Emergency Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "**Reason:** ${{ github.event.workflow_run.name }} failed" >> $GITHUB_STEP_SUMMARY
            echo "**Failed Run:** ${{ github.event.workflow_run.html_url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Reason:** ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Site:** https://www.leagueoffun.com/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Emergency deployment ensures site availability during main workflow issues._" >> $GITHUB_STEP_SUMMARY
